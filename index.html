<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdHost VPS Pro - Auto Sync Edition</title>
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        :root {
            --bg-main: #0b1120;
            --bg-card: rgba(30, 41, 59, 0.6);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden;
            background: radial-gradient(circle at 50% 0%, #1e1b4b, #0b1120 70%);
        }
        
        .orb {
            position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.4;
            animation: float 15s infinite alternate ease-in-out;
        }
        .orb-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--primary); }
        .orb-2 { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: #8b5cf6; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }

        .glass-panel {
            background: var(--bg-card); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color); border-radius: 24px; box-shadow: var(--glass-shadow);
        }

        .content-padding { padding: 30px; }

        /* View Router Transitions */
        .view-section {
            display: none; opacity: 0; transform: translateY(20px) scale(0.98);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .view-section.active { display: block; opacity: 1; transform: translateY(0) scale(1); }

        /* Loader & Animations */
        #pageLoader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 17, 32, 0.85); backdrop-filter: blur(5px); z-index: 9999;
            display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 15px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #pageLoader.loading { opacity: 1; pointer-events: all; }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(99, 102, 241, 0.3);
            border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 🔥 ROCKET ANIMATION 🔥 */
        .rocket-icon {
            display: inline-block;
            font-size: 2.2rem;
            animation: flyRocket 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));
        }
        @keyframes flyRocket {
            0%   { transform: translateY(0) rotate(0deg) scale(1); }
            50%  { transform: translateY(-8px) rotate(15deg) scale(1.1); }
            100% { transform: translateY(0) rotate(0deg) scale(1); }
        }

        /* Auto Sync Indicator */
        .sync-badge {
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold;
            display: inline-flex; align-items: center; gap: 8px; transition: all 0.3s ease;
        }
        .sync-dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
        }
        @keyframes pulseDot { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
        
        .spinner-small {
            width: 14px; height: 14px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block;
        }

        /* Typography & Headers */
        h1 {
            font-size: 2.2rem; font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            display: flex; align-items: center; gap: 15px; margin-bottom: 5px;
        }

        .top-navbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 30px; margin-bottom: 30px; flex-wrap: wrap; gap: 20px;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px; border: 1px solid transparent; border-radius: 12px;
            font-size: 0.95rem; cursor: pointer; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 600; display: inline-flex; justify-content: center; align-items: center; gap: 8px; color: white;
        }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(135deg, var(--primary), #8b5cf6); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .btn-primary:hover { box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5); transform: translateY(-2px); filter: brightness(1.1); }
        .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); }
        .btn-warning { background: linear-gradient(135deg, var(--warning), #d97706); }
        .btn-sm { padding: 8px 16px; font-size: 0.85rem; border-radius: 8px; }

        /* Dashboard Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 25px; text-align: center; border-radius: 20px; transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); background: rgba(30, 41, 59, 0.8); border-color: rgba(99,102,241,0.5); }
        .stat-num { font-size: 2.5rem; font-weight: 800; color: white; margin-bottom: 5px; }
        .stat-lbl { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Mobile-Friendly Grids */
        .category-grid, .vps-grid { display: grid; gap: 20px; margin-top: 20px; }
        .category-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .vps-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

        .card-hover {
            background: rgba(30, 41, 59, 0.5); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 25px; cursor: pointer; transition: 0.3s; position: relative;
        }
        .card-hover:hover {
            transform: translateY(-5px); background: rgba(30, 41, 59, 0.8);
            border-color: rgba(99, 102, 241, 0.5); box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        /* VPS Cards */
        .vps-card { padding: 0; overflow: hidden; display: flex; flex-direction: column; cursor: default; }
        .vps-header-bg { padding: 20px; background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-color); position: relative; }
        .vps-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }
        .vps-status { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .status-safe { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-error { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.3); }
        
        .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .spec-item { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; border: 1px solid rgba(255,255,255,0.02); }

        /* TABS - MOBILE RESPONSIVE */
        .tab-nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 16px; width: 100%; max-width: max-content; }
        .tab-btn { flex: 1; padding: 10px 20px; background: transparent; border: none; color: var(--text-muted); border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; white-space: nowrap; text-align: center; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
        
        .tab-pane { display: none; animation: fadeIn 0.4s ease; }
        .tab-pane.active { display: block; }

        /* Forms & Inputs */
        .form-control {
            width: 100%; padding: 14px 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color);
            border-radius: 12px; color: white; font-size: 1rem; transition: 0.3s;
        }
        .form-control:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.5); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); }
        .form-label { color: var(--text-muted); font-weight: 500; margin-bottom: 8px; display: block; font-size: 0.95rem; }
        
        /* Modals */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 17, 32, 0.85); backdrop-filter: blur(10px);
            z-index: 1000; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s; padding: 15px;
        }
        .modal.active { display: flex; opacity: 1; }
        .modal-content {
            background: var(--bg-main); border: 1px solid var(--border-color);
            border-radius: 24px; padding: 30px; width: 100%; max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            transform: scale(0.95) translateY(20px); transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh; overflow-y: auto;
        }
        .modal.active .modal-content { transform: scale(1) translateY(0); }

        /* Toasts */
        .toast {
            position: fixed; bottom: 20px; right: 20px; left: 20px; padding: 16px 24px; border-radius: 16px;
            color: white; font-weight: 500; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2000;
            transform: translateY(120%) scale(0.9); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; max-width: 400px; margin: 0 auto;
        }
        .toast.show { transform: translateY(0) scale(1); opacity: 1; }
        .toast.success { background: rgba(16, 185, 129, 0.95); }
        .toast.error { background: rgba(239, 68, 68, 0.95); }

        .content-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 16px; padding: 25px; overflow-x: auto; }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .content-padding { padding: 15px; }
            .top-navbar { flex-direction: column; align-items: stretch; text-align: center; padding: 15px; }
            h1 { justify-content: center; font-size: 1.8rem; }
            .btn { width: 100%; }
            .category-grid { grid-template-columns: 1fr; }
            .vps-grid { grid-template-columns: 1fr; }
            .tab-nav { width: 100%; max-width: 100%; border-radius: 12px; }
            .tab-btn { padding: 10px; font-size: 0.85rem; }
            .header-actions-mobile { display: flex; flex-direction: column; gap: 10px; width: 100%; }
            .header-actions-mobile > * { width: 100%; }
            .form-grid-mobile { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div id="pageLoader">
        <div class="spinner"></div>
        <div id="loaderText" style="color: white; font-weight: bold; margin-top: 15px;">Menyiapkan Sistem...</div>
    </div>

    <div class="container">
        <div id="view-home" class="view-section active">
            <header class="top-navbar glass-panel">
                <div style="margin-bottom: 10px;">
                    <h1><span class="rocket-icon">🚀</span> AdHost Pro</h1>
                    <p style="color: var(--text-muted);">Sistem Manajemen Inventaris Server</p>
                </div>
                <div class="header-actions-mobile" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; align-items: center;">
                    <div id="cloudSyncStatus" class="sync-badge" style="background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3);">
                        <span class="sync-dot" style="background: #34d399; animation: pulseDot 2s infinite;"></span> ☁️ Standby
                    </div>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card glass-panel">
                    <div class="stat-num" id="totalCategories">0</div>
                    <div class="stat-lbl">Total Workspace</div>
                </div>
                <div class="stat-card glass-panel">
                    <div class="stat-num" id="totalVPS">0</div>
                    <div class="stat-lbl">Server Aktif</div>
                </div>
                <div class="stat-card glass-panel">
                    <div class="stat-num" id="totalValue">0</div>
                    <div class="stat-lbl">Valuasi (Ribuan)</div>
                </div>
            </div>

            <div class="glass-panel content-padding">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                    <h2 style="font-size: 1.5rem;">🗂️ Direktori Workspace</h2>
                    <button class="btn btn-primary" onclick="openModal('categoryModal')">+ Buat Kategori Baru</button>
                </div>
                <div class="category-grid" id="categoryGrid"></div>
            </div>
        </div>

        <div id="view-category" class="view-section">
            <div class="glass-panel content-padding" style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div style="display: flex; align-items: center; gap: 15px; width: 100%; flex-wrap: wrap;">
                    <button class="btn btn-secondary" onclick="goHome()" style="padding: 10px 15px; width: auto; flex: 0 0 auto;">⬅️ Kembali</button>
                    <h2 id="categoryTitle" style="color: white; font-size: 1.3rem; flex: 1; word-break: break-all;"></h2>
                </div>
                <div class="header-actions-mobile" style="display: flex; gap: 10px; flex-wrap: wrap; width: 100%;">
                    <button class="btn btn-danger btn-sm" onclick="deleteCurrentCategory()">🗑️ Hapus Kategori</button>
                </div>
            </div>

            <div class="glass-panel content-padding">
                <div class="tab-nav">
                    <button class="tab-btn active" onclick="switchTab('tab-list', this)">💻 Nodes/VPS</button>
                    <button class="tab-btn" onclick="switchTab('tab-bon', this)">🧾 Invoice Pending</button>
                    <button class="tab-btn" onclick="switchTab('tab-info', this)">📊 Analytics</button>
                </div>

                <div id="tab-list" class="tab-pane active">
                    <div class="header-actions-mobile" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
                        <input type="text" class="form-control" id="searchBar" placeholder="🔍 Cari IP, Lokasi, Spesifikasi..." style="flex: 1; min-width: 250px;">
                        <button class="btn btn-primary" onclick="openVPSModal()">+ Deploy Server Baru</button>
                    </div>
                    <div class="vps-grid" id="vpsGrid"></div>
                </div>

                <div id="tab-bon" class="tab-pane">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
                        <h3 style="color: white; font-size: 1.2rem;">🧾 Tagihan / Invoice Pending</h3>
                        <button class="btn btn-sm btn-primary" style="width: auto;" onclick="copyText('bonContent')">📋 Copy Teks</button>
                    </div>
                    <div class="content-box" style="font-family: monospace; white-space: pre-wrap; line-height: 1.6;">
                        <div id="bonContent" style="min-width: 280px;"></div>
                    </div>
                </div>

                <div id="tab-info" class="tab-pane">
                    <h3 style="margin-bottom: 15px; color: white;">📊 Server Analytics</h3>
                    <div class="content-box" style="padding: 15px;" id="infoContent"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <h3 style="color: white; margin-bottom: 20px;">Buat Workspace Baru</h3>
            <form onsubmit="addCategory(event)">
                <label class="form-label">Nama Kategori / Label Group</label>
                <input type="text" class="form-control" id="categoryName" required placeholder="Cth: AdHost SG Premium">
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('categoryModal')">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan Label</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="vpsModal">
        <div class="modal-content">
            <h3 id="vpsModalTitle" style="color: white; margin-bottom: 20px;">Deploy Server Baru</h3>
            <form onsubmit="saveVPS(event)" id="vpsForm">
                
                <div style="margin-bottom: 15px;">
                    <label class="form-label">AdHost Quick Preset (Otomatis Isi)</label>
                    <select class="form-control" id="vpsTemplate" onchange="fillVPSTemplate()" style="appearance: none; background-color: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.5);">
                        <option value="">-- Pilih Preset VPS AdHost --</option>
                    </select>
                </div>

                <div class="form-grid-mobile" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div><label class="form-label">RAM (GB)</label><input type="number" class="form-control" id="ram" required></div>
                    <div><label class="form-label">vCPU Core</label><input type="number" class="form-control" id="core" required></div>
                    <div><label class="form-label">Storage (GB)</label><input type="number" class="form-control" id="ssd" required></div>
                    <div><label class="form-label">Bandwidth (TB)</label><input type="number" step="0.1" class="form-control" id="bandwidth" required></div>
                    <div><label class="form-label">Harga (Ribu Rp)</label><input type="number" class="form-control" id="price" required></div>
                    <div><label class="form-label">Data Center (Lokasi)</label><input type="text" class="form-control" id="location" required></div>
                    <div><label class="form-label">IP Public</label><input type="text" class="form-control" id="ipAddress" placeholder="103.x.x.x"></div>
                    <div>
                        <label class="form-label">Status Node</label>
                        <select class="form-control" id="status" style="appearance: none;">
                            <option value="safe">✅ Safe / Running</option>
                            <option value="pending">⏳ Pending Setup</option>
                            <option value="error">❌ Error / Down</option>
                        </select>
                    </div>
                </div>
                <div class="header-actions-mobile" style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('vpsModal')">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan Konfigurasi</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ==========================================
        // KONFIGURASI CLOUD SYNC JSONBIN.IO
        // ==========================================
        const JSONBIN_MASTER_KEY = "$2a$10$1WzAEjKDOESCz17Q.8aduu6Bx.jkQ15lI5cjfeweV.7X8AnYG5LH.";
        const JSONBIN_ID = "69c6ba09c3097a1dd5689eac"; 

        // DATA PRESET
        const vpsTemplates = [
            { ram: 2, core: 1, ssd: 40, bandwidth: 0.5, price: 35, location: 'Genoa' },
            { ram: 4, core: 2, ssd: 80, bandwidth: 1, price: 45, location: 'Genoa' },
            { ram: 8, core: 4, ssd: 160, bandwidth: 2, price: 65, location: 'Genoa' },
            { ram: 16, core: 4, ssd: 160, bandwidth: 2, price: 70, location: 'Milan' },
            { ram: 16, core: 8, ssd: 320, bandwidth: 3, price: 80, location: 'Genoa' },
            { ram: 32, core: 8, ssd: 240, bandwidth: 3, price: 90, location: 'Milan' },
            { ram: 32, core: 16, ssd: 680, bandwidth: 5, price: 100, location: 'Genoa' },
            { ram: 64, core: 8, ssd: 320, bandwidth: 4, price: 110, location: 'Milan' },
            { ram: 128, core: 32, ssd: 600, bandwidth: 6, price: 140, location: 'Milan' },
            { ram: 192, core: 48, ssd: 960, bandwidth: 8, price: 180, location: 'Milan' }
        ];

        let categories = JSON.parse(localStorage.getItem('adhostData'))?.categories || [];
        let currentCategory = null;
        let editingVPS = null;
        let isSyncing = false; // Mencegah double sync

        // INITIALIZE APP - AUTO LOAD DARI CLOUD SAAT DIBUKA
        document.addEventListener('DOMContentLoaded', () => {
            populateVPSTemplates();
            autoLoadFromCloud(); // Tarik data cloud begitu web dibuka
            window.addEventListener('hashchange', handleRouting);
        });

        // ==========================================
        // SISTEM AUTO-SYNC (BACKGROUND PROCESS)
        // ==========================================
        function updateSyncStatus(status) {
            const badge = document.getElementById('cloudSyncStatus');
            if(!badge) return;

            if(status === 'syncing') {
                badge.style.background = 'rgba(245, 158, 11, 0.2)'; badge.style.color = '#fbbf24'; badge.style.borderColor = 'rgba(245, 158, 11, 0.3)';
                badge.innerHTML = `<span class="spinner-small"></span> ☁️ Menyimpan...`;
            } else if (status === 'synced') {
                badge.style.background = 'rgba(16, 185, 129, 0.2)'; badge.style.color = '#34d399'; badge.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                badge.innerHTML = `<span class="sync-dot" style="background: #34d399; animation: pulseDot 2s infinite;"></span> ☁️ Tersinkronisasi`;
            } else if (status === 'error') {
                badge.style.background = 'rgba(239, 68, 68, 0.2)'; badge.style.color = '#f87171'; badge.style.borderColor = 'rgba(239, 68, 68, 0.3)';
                badge.innerHTML = `⚠️ Gagal Sync`;
            }
        }

        async function autoLoadFromCloud() {
            showLoader("Menyinkronkan Data Cloud...");
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
                    method: 'GET',
                    headers: { 'X-Master-Key': JSONBIN_MASTER_KEY }
                });
                if(res.ok) {
                    const data = await res.json();
                    categories = data.record.categories || [];
                    localStorage.setItem('adhostData', JSON.stringify({ categories })); 
                    updateSyncStatus('synced');
                }
            } catch (error) {
                console.error("Gagal load dari cloud:", error);
                updateSyncStatus('error');
            }
            // Lanjutkan routing / render UI walaupun gagal narik dari cloud
            handleRouting();
            hideLoader();
        }

        async function backgroundSync() {
            if(isSyncing) return; // Cegah numpuk request
            isSyncing = true;
            updateSyncStatus('syncing');

            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_MASTER_KEY
                    },
                    body: JSON.stringify({ categories: categories })
                });

                if(res.ok) updateSyncStatus('synced');
                else updateSyncStatus('error');
            } catch (error) {
                updateSyncStatus('error');
            }
            isSyncing = false;
        }

        // Modifikasi saveData supaya otomatis trigger backgroundSync
        function saveData() {
            localStorage.setItem('adhostData', JSON.stringify({ categories }));
            updateStats();
            backgroundSync(); // Panggil fungsi ajaib ini setiap kali ada perubahan data!
        }


        // ==========================================
        // PRESET TEMPLATE LOGIC
        // ==========================================
        function populateVPSTemplates() {
            const select = document.getElementById('vpsTemplate');
            vpsTemplates.forEach((template, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `RAM ${template.ram}GB - ${template.core} Core - ${template.location} - Rp ${template.price}K`;
                select.appendChild(option);
            });
        }

        function fillVPSTemplate() {
            const index = document.getElementById('vpsTemplate').value;
            if (index !== '') {
                const t = vpsTemplates[index];
                document.getElementById('ram').value = t.ram;
                document.getElementById('core').value = t.core;
                document.getElementById('ssd').value = t.ssd;
                document.getElementById('bandwidth').value = t.bandwidth;
                document.getElementById('price').value = t.price;
                document.getElementById('location').value = t.location;
            }
        }

        // ==========================================
        // SPA ROUTER LOGIC
        // ==========================================
        function handleRouting() {
            const hash = window.location.hash;
            document.getElementById('pageLoader').style.opacity = '1'; 
            document.getElementById('pageLoader').style.pointerEvents = 'all';

            setTimeout(() => {
                if (hash.startsWith('#category-')) {
                    const id = parseInt(hash.replace('#category-', ''));
                    loadCategoryPage(id);
                } else {
                    loadHomePage();
                }
                hideLoader();
                window.scrollTo(0,0);
            }, 200);
        }

        function showLoader(text = "Loading...") { 
            document.getElementById('loaderText').textContent = text;
            document.getElementById('pageLoader').classList.add('loading'); 
        }
        function hideLoader() { document.getElementById('pageLoader').classList.remove('loading'); }
        function goHome() { window.location.hash = ''; } 

        function loadHomePage() {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-home').classList.add('active');
            renderCategories();
            updateStats();
        }

        function loadCategoryPage(id) {
            currentCategory = categories.find(c => c.id === id);
            if (!currentCategory) {
                showToast('Kategori tidak ditemukan!', 'error');
                goHome();
                return;
            }

            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById('view-category').classList.add('active');
            document.getElementById('categoryTitle').innerHTML = `🗂️ ${currentCategory.name}`;
            
            const firstTabBtn = document.querySelector('.tab-nav .tab-btn');
            switchTab('tab-list', firstTabBtn);
            
            renderVPSList();
        }

        // ==========================================
        // TAB LOGIC
        // ==========================================
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            
            if(btnElement) btnElement.classList.add('active');
            document.getElementById(tabId).classList.add('active');

            if (tabId === 'tab-bon') {
                const container = document.getElementById('bonContent');
                container.innerHTML = ''; 
                generateBonText(container);
            } else if (tabId === 'tab-info') {
                const container = document.getElementById('infoContent');
                container.innerHTML = ''; 
                generateAnalyticsHTML(container);
            }
        }

        // ==========================================
        // RENDER FUNCTIONS
        // ==========================================
        function updateStats() {
            document.getElementById('totalCategories').textContent = categories.length;
            document.getElementById('totalVPS').textContent = categories.reduce((sum, cat) => sum + cat.vpsList.length, 0);
            document.getElementById('totalValue').textContent = categories.reduce((sum, cat) => sum + cat.vpsList.reduce((vSum, vps) => vSum + vps.price, 0), 0);
        }

        function renderCategories() {
            const grid = document.getElementById('categoryGrid');
            if (categories.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;color:var(--text-muted);border:1px dashed rgba(255,255,255,0.1);border-radius:20px;">Belum ada workspace</div>`;
                return;
            }
            grid.innerHTML = categories.map(cat => `
                <div class="card-hover" onclick="window.location.hash='#category-${cat.id}'">
                    <h3 style="font-size:1.4rem;margin-bottom:10px;word-break:break-word;">🗂️ ${cat.name}</h3>
                    <p style="color:var(--text-muted);">${cat.vpsList.length} Nodes • Rp ${cat.vpsList.reduce((s,v)=>s+v.price,0)}K/bln</p>
                </div>
            `).join('');
        }

        function renderVPSList(search = '') {
            if (!currentCategory) return;
            let list = currentCategory.vpsList;
            if (search) {
                const s = search.toLowerCase();
                list = list.filter(v => Object.values(v).some(val => String(val).toLowerCase().includes(s)));
            }
            
            const grid = document.getElementById('vpsGrid');
            if (list.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;color:var(--text-muted);">Tidak ada server ditemukan.</div>`;
                return;
            }

            grid.innerHTML = list.map(vps => `
                <div class="card-hover vps-card">
                    <div class="vps-header-bg">
                        <div class="vps-status status-${vps.status}">${vps.status}</div>
                        <div style="font-size:1.6rem;font-weight:bold;color:white;">Rp ${vps.price}K<span style="font-size:1rem;color:var(--text-muted);">/bln</span></div>
                        <div style="color:var(--text-muted);font-size:0.9rem;">📍 ${vps.location}</div>
                    </div>
                    <div class="vps-body">
                        <div class="spec-grid">
                            <div class="spec-item">💾 ${vps.ram}GB RAM</div>
                            <div class="spec-item">⚡ ${vps.core} Core</div>
                            <div class="spec-item">💽 ${vps.ssd}GB SSD</div>
                            <div class="spec-item">🌐 ${vps.bandwidth}TB BW</div>
                        </div>
                        <div style="background:rgba(0,0,0,0.3);padding:10px;border-radius:8px;color:var(--info);font-family:monospace;margin-bottom:auto;word-break:break-all;">
                            🌍 ${vps.ipAddress || 'No IP Assigned'}
                        </div>
                        <div style="display:flex;gap:10px;margin-top:10px;">
                            <button class="btn btn-secondary btn-sm" style="flex:1;" onclick="editVPS(${vps.id})">✏️ Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteVPS(${vps.id})">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ==========================================
        // GENERATOR TAB KONTEN
        // ==========================================
        function generateBonText(container) {
            const pend = currentCategory.vpsList.filter(v => v.status === 'pending');
            let text = `==================================\n   ADHOST - INVOICE PENDING\n==================================\nTanggal: ${new Date().toLocaleString('id-ID')}\nWorkspace: ${currentCategory.name}\n----------------------------------\n`;
            
            if (pend.length === 0) {
                text += '🎉 All systems are running safe (Tidak ada tagihan tertunda).\n';
            } else {
                pend.forEach((v, i) => {
                    text += `${i + 1}. Server ${v.location} (Rp ${v.price}K/bln)\n   ${v.ram}GB RAM | ${v.core} Core | ${v.ssd}GB SSD\n----------------------------------\n`;
                });
            }
            
            text += `Total Node Pending : ${pend.length}\nTotal Tagihan    : Rp ${pend.reduce((s, v) => s + v.price, 0)}K/bln\n==================================`;
            container.innerText = text;
        }

        function generateAnalyticsHTML(container) {
            const safe = currentCategory.vpsList.filter(v => v.status === 'safe').length;
            const pend = currentCategory.vpsList.filter(v => v.status === 'pending').length;
            const err = currentCategory.vpsList.filter(v => v.status === 'error').length;
            const totalVal = currentCategory.vpsList.reduce((s, v) => s + v.price, 0);

            container.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; text-align: center;">
                    <div style="background: rgba(16, 185, 129, 0.2); padding: 15px; border-radius: 12px; border: 1px solid rgba(16, 185, 129, 0.3);">
                        <div style="font-size: 1.5rem; color: #34d399; font-weight: bold;">${safe}</div>
                        <div style="font-size: 0.8rem; color: white;">Online</div>
                    </div>
                    <div style="background: rgba(245, 158, 11, 0.2); padding: 15px; border-radius: 12px; border: 1px solid rgba(245, 158, 11, 0.3);">
                        <div style="font-size: 1.5rem; color: #fbbf24; font-weight: bold;">${pend}</div>
                        <div style="font-size: 0.8rem; color: white;">Pending</div>
                    </div>
                    <div style="background: rgba(239, 68, 68, 0.2); padding: 15px; border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.3);">
                        <div style="font-size: 1.5rem; color: #f87171; font-weight: bold;">${err}</div>
                        <div style="font-size: 0.8rem; color: white;">Error</div>
                    </div>
                </div>
                <div style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; border-left: 4px solid var(--primary);">
                    <div style="font-size: 1.2rem; font-weight: bold; color: white; margin-bottom: 5px;">Total Valuasi:<br>Rp ${totalVal}K / Bulan</div>
                    <p style="color: var(--text-muted); font-size: 0.8rem;">Sistem terupdate otomatis.</p>
                </div>
            `;
        }

        // ==========================================
        // CRUD & UTILS
        // ==========================================
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        function showToast(msg, type='success') {
            const t = document.getElementById('toast');
            t.className = `toast show ${type}`; t.textContent = msg;
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function addCategory(e) {
            e.preventDefault(); const name = document.getElementById('categoryName').value.trim();
            if(categories.some(c=>c.name.toLowerCase()===name.toLowerCase())) return showToast('Nama sudah ada!', 'error');
            const newId = Date.now();
            categories.push({ id: newId, name, vpsList: [] });
            saveData(); closeModal('categoryModal'); document.getElementById('categoryName').value = '';
            
            window.location.hash = `#category-${newId}`;
            showToast('Workspace Dibuat!');
        }

        function deleteCurrentCategory() {
            if(!confirm('Yakin hapus workspace ini dan semua servernya?')) return;
            categories = categories.filter(c => c.id !== currentCategory.id);
            saveData(); showToast('Workspace Dihapus'); goHome();
        }

        function openVPSModal() {
            editingVPS = null; 
            document.getElementById('vpsModalTitle').textContent = 'Deploy Server Baru';
            document.getElementById('vpsForm').reset(); 
            document.getElementById('vpsTemplate').value = "";
            openModal('vpsModal');
        }

        function saveVPS(e) {
            e.preventDefault();
            const vpsData = {
                ram: document.getElementById('ram').value, core: document.getElementById('core').value,
                ssd: document.getElementById('ssd').value, bandwidth: document.getElementById('bandwidth').value,
                price: parseInt(document.getElementById('price').value), location: document.getElementById('location').value,
                ipAddress: document.getElementById('ipAddress').value.trim(), status: document.getElementById('status').value
            };
            if(!vpsData.ipAddress && vpsData.status === 'safe') vpsData.status = 'pending';

            if(editingVPS) { Object.assign(currentCategory.vpsList.find(v=>v.id===editingVPS.id), vpsData); showToast('Config diupdate!'); }
            else { currentCategory.vpsList.push({ id: Date.now(), ...vpsData }); showToast('Server dideploy!'); }
            
            saveData(); renderVPSList(); closeModal('vpsModal');
        }

        function editVPS(id) {
            editingVPS = currentCategory.vpsList.find(v=>v.id===id); if(!editingVPS) return;
            document.getElementById('vpsModalTitle').textContent = 'Edit Konfigurasi';
            document.getElementById('vpsTemplate').value = "";
            ['ram','core','ssd','bandwidth','price','location','ipAddress','status'].forEach(k => {
                if(document.getElementById(k)) document.getElementById(k).value = editingVPS[k] || '';
            });
            openModal('vpsModal');
        }

        function deleteVPS(id) {
            if(!confirm('Terminasi server ini?')) return;
            currentCategory.vpsList = currentCategory.vpsList.filter(v=>v.id!==id);
            saveData(); renderVPSList(); showToast('Server diterminasi');
        }

        function copyText(elId) { navigator.clipboard.writeText(document.getElementById(elId).innerText); showToast('Teks disalin!'); }

        document.getElementById('searchBar')?.addEventListener('input', e => renderVPSList(e.target.value));
        window.onclick = e => { if(e.target.classList.contains('modal')) closeModal(e.target.id); }
    </script>
</body>
</html>
