<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdHost Testimoni Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .card-online { border-left: 4px solid #10b981; } /* Emerald-500 */
        .card-expired { border-left: 4px solid #ef4444; } /* Red-500 */
    </style>
</head>
<body class="p-6 md:p-10 font-sans text-gray-800">

    <div class="max-w-4xl mx-auto">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">🚀 AdHost Testimoni Manager</h1>
            <p class="text-gray-500">Generate teks done & pantau status layanan</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h2 class="text-xl font-bold mb-4">Tambah Testimoni (Paste Invoice)</h2>
            <textarea id="invoiceInput" rows="8" class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none mb-4 font-mono text-sm" placeholder="Paste invoice dari WhatsApp di sini..."></textarea>
            <button onclick="processInvoice()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200">
                Buat Testimoni & Simpan
            </button>
        </div>

        <h2 class="text-xl font-bold mb-4">Daftar Transaksi</h2>
        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <script>
        // Array bulan untuk konversi tanggal
        const namaBulan = ["januari", "februari", "maret", "april", "mei", "juni", "juli", "agustus", "september", "oktober", "november", "desember"];

        // Load data saat halaman dibuka
        document.addEventListener("DOMContentLoaded", renderCards);

        function processInvoice() {
            const text = document.getElementById("invoiceInput").value;
            if (!text.trim()) return alert("Teks invoice tidak boleh kosong!");

            // Ekstrak data menggunakan Regex
            const extract = (regex) => {
                const match = text.match(regex);
                return match ? match[1].trim() : "-";
            };

            const orderId = extract(/\*🆔 Order ID\s*:\*\s*([^\n]+)/);
            const tanggal = extract(/\*📅 Tanggal\s*:\*\s*([^\n]+)/);
            const wa = extract(/\*📱 WhatsApp\s*:\*\s*([^\n]+)/);
            const namaPaket = extract(/\*▪️ Nama\s*:\*\s*([^\n]+)/);
            const harga = extract(/\*▪️ Harga\s*:\*\s*([^\n]+)/);
            const spek = extract(/\*▪️ Spek\s*:\*\s*([^\n]+)/);

            if (orderId === "-" || namaPaket === "-") {
                return alert("Gagal mengekstrak data! Pastikan format invoice sesuai.");
            }

            // Hitung Tanggal Beli & Expired (1 bulan) dari teks
            let purchaseDate = new Date();
            const dateMatch = tanggal.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
            
            if (dateMatch) {
                const day = parseInt(dateMatch[1]);
                const monthIndex = namaBulan.indexOf(dateMatch[2].toLowerCase());
                const year = parseInt(dateMatch[3]);
                if (monthIndex !== -1) {
                    purchaseDate = new Date(year, monthIndex, day);
                }
            }

            const expiryDate = new Date(purchaseDate);
            expiryDate.setMonth(expiryDate.getMonth() + 1);

            // Teks Done (Siap Copy)
            const textDone = `TRANSACTION DONE ✅\n\n🆔 Order ID : ${orderId}\n📅 Tanggal : ${tanggal}\n\n📦 RINCIAN PAKET\n▪️ Nama : ${namaPaket}\n▪️ Harga : ${harga}\n▪️ Spek : ${spek}\n\nTerimakasih Sudah Beli Di AdHost 👍🏼`;

            // Buat Object Data
            const newData = {
                id: Date.now().toString(),
                orderId, tanggal, wa, namaPaket, harga, spek,
                purchaseDateMs: purchaseDate.getTime(),
                expiryDateMs: expiryDate.getTime(),
                textDone
            };

            // Simpan ke Local Storage
            let db = JSON.parse(localStorage.getItem("adhost_db")) || [];
            db.unshift(newData); // Tambah di awal
            localStorage.setItem("adhost_db", JSON.stringify(db));

            // Reset input & render ulang
            document.getElementById("invoiceInput").value = "";
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById("cardsContainer");
            container.innerHTML = "";
            let db = JSON.parse(localStorage.getItem("adhost_db")) || [];

            if (db.length === 0) {
                container.innerHTML = `<p class="text-gray-500 italic">Belum ada data transaksi.</p>`;
                return;
            }

            const now = new Date().getTime();

            db.forEach(data => {
                const isExpired = now >= data.expiryDateMs;
                const cardClass = isExpired ? 'card-expired' : 'card-online';
                const statusBadge = isExpired 
                    ? `<span class="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold">🔴 EXPIRED</span>` 
                    : `<span class="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-xs font-bold">🟢 ONLINE</span>`;

                // Hitung sisa hari
                let sisaHariText = "Layanan sudah habis";
                if (!isExpired) {
                    const diffTime = Math.abs(data.expiryDateMs - now);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                    sisaHariText = `${diffDays} hari lagi`;
                }

                // Format nomor WA untuk link wa.me
                let waLink = data.wa.replace(/\D/g, '');
                if (waLink.startsWith('0')) waLink = '62' + waLink.substring(1);

                const cardHTML = `
                    <div class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition ${cardClass} flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="font-bold text-lg text-gray-800">${data.orderId}</h3>
                                    <p class="text-sm font-semibold text-blue-600">${data.namaPaket}</p>
                                </div>
                                ${statusBadge}
                            </div>
                            
                            <div class="text-sm text-gray-600 space-y-1 mb-4 bg-gray-50 p-3 rounded-lg">
                                <p><strong>💰 Harga:</strong> ${data.harga}</p>
                                <p><strong>⚙️ Spek:</strong> ${data.spek}</p>
                                <p><strong>📅 Beli:</strong> ${new Date(data.purchaseDateMs).toLocaleDateString('id-ID')}</p>
                                <p><strong>⏳ Expired:</strong> ${new Date(data.expiryDateMs).toLocaleDateString('id-ID')} <span class="text-xs text-gray-400">(${sisaHariText})</span></p>
                            </div>
                        </div>

                        <div class="flex gap-2 mt-auto">
                            <button onclick="copyToClipboard('${data.id}')" id="btn-copy-${data.id}" class="flex-1 bg-gray-800 hover:bg-gray-900 text-white text-sm font-bold py-2 rounded transition">
                                📋 Copy Text
                            </button>
                            <a href="https://wa.me/${waLink}" target="_blank" class="flex-1 bg-green-500 hover:bg-green-600 text-white text-sm font-bold py-2 rounded transition text-center flex items-center justify-center">
                                💬 WA Client
                            </a>
                            <button onclick="deleteData('${data.id}')" class="bg-red-500 hover:bg-red-600 text-white p-2 rounded transition" title="Hapus Data">
                                🗑️
                            </button>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHTML;
            });
        }

        function copyToClipboard(id) {
            const db = JSON.parse(localStorage.getItem("adhost_db")) || [];
            const data = db.find(d => d.id === id);
            
            if (data) {
                navigator.clipboard.writeText(data.textDone).then(() => {
                    const btn = document.getElementById(`btn-copy-${id}`);
                    const originalText = btn.innerHTML;
                    btn.innerHTML = "✅ Copied!";
                    btn.classList.add("bg-green-600");
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove("bg-green-600");
                    }, 2000);
                });
            }
        }

        function deleteData(id) {
            if (confirm("Yakin ingin menghapus data ini?")) {
                let db = JSON.parse(localStorage.getItem("adhost_db")) || [];
                db = db.filter(d => d.id !== id);
                localStorage.setItem("adhost_db", JSON.stringify(db));
                renderCards();
            }
        }
    </script>
</body>
</html>
