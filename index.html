<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdHost Testimoni & Web Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .card-online { border-left: 4px solid #10b981; }
        .card-expired { border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="p-6 md:p-10 font-sans text-gray-800 relative">

    <div class="max-w-4xl mx-auto">
        <div class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">🚀 AdHost Admin System</h1>
            <p class="text-gray-500">Generator Testimoni & Data Login Web</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8 border border-gray-200">
            <h2 class="text-xl font-bold mb-4 flex items-center">📝 Input Invoice</h2>
            <textarea id="invoiceInput" rows="6" class="w-full p-4 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none mb-4 font-mono text-sm" placeholder="Paste invoice WhatsApp di sini..."></textarea>
            <button onclick="processInvoice()" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition duration-200 shadow-lg">
                Simpan Transaksi
            </button>
        </div>

        <h2 class="text-xl font-bold mb-4">Daftar Transaksi & Layanan</h2>
        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <div id="customModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 px-4">
        <div class="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md relative transform transition-all">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 font-bold text-lg leading-none">✖</button>
            <h3 class="text-lg font-bold text-gray-800 mb-1">⚙️ Setup Web Login</h3>
            <p class="text-xs text-gray-500 mb-4">Masukkan username untuk klien, lalu klik Copy.</p>
            
            <div class="flex gap-2 items-stretch">
                <input type="text" id="userPanelInput" class="flex-1 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none font-mono text-sm" placeholder="Masukkan User Panel...">
                <button onclick="confirmCopyWeb()" id="btn-modal-copy" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-5 rounded-lg transition shadow-md whitespace-nowrap">
                    📋 Copy
                </button>
            </div>
        </div>
    </div>

    <script>
        const bulanMap = {
            "januari": 0, "jan": 0, "februari": 1, "feb": 1, "maret": 2, "mar": 2,
            "april": 3, "apr": 3, "mei": 4, "juni": 5, "jun": 5, "juli": 6, "jul": 6,
            "agustus": 7, "agu": 7, "september": 8, "sep": 8, "oktober": 9, "okt": 9,
            "november": 10, "nov": 10, "desember": 11, "des": 11
        };

        let currentWebId = null;

        document.addEventListener("DOMContentLoaded", renderCards);

        function processInvoice() {
            // 1. Ambil teks dan langsung bersihkan dari bintang/underscore bawaan WA
            const rawText = document.getElementById("invoiceInput").value;
            if (!rawText.trim()) return alert("Teks invoice kosong!");
            const text = rawText.replace(/[*_]/g, ''); 

            const extract = (regex) => {
                const match = text.match(regex);
                return match ? match[1].trim() : "-";
            };

            // 2. Ekstrak data tanpa perlu mikirin tanda bintang lagi
            const orderId = extract(/🆔 Order ID\s*:\s*([^\n]+)/i);
            const tanggal = extract(/📅 Tanggal\s*:\s*([^\n]+)/i);
            const wa = extract(/📱 WhatsApp\s*:\s*([^\n]+)/i);
            const namaPaket = extract(/▪️ Nama\s*:\s*([^\n]+)/i);
            const harga = extract(/▪️ Harga\s*:\s*([^\n]+)/i);
            const spek = extract(/▪️ Spek\s*:\s*([^\n]+)/i);

            if (orderId === "-" || tanggal === "-") {
                return alert("Gagal mengambil data! Pastikan teks invoice sudah benar.");
            }

            // 3. Ekstrak Tanggal Pembelian Super Akurat
            let purchaseDate = new Date(); // Nilai default kalau gagal
            const dateMatch = tanggal.match(/(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})/);
            
            if (dateMatch) {
                const day = parseInt(dateMatch[1]);
                const monthStr = dateMatch[2].toLowerCase();
                const year = parseInt(dateMatch[3]);
                const monthIndex = bulanMap[monthStr];
                
                if (monthIndex !== undefined) {
                    purchaseDate = new Date(year, monthIndex, day); // Set sesuai tanggal di invoice!
                }
            }

            // 4. Tambah 1 Bulan untuk Expired
            const expiryDate = new Date(purchaseDate);
            expiryDate.setMonth(expiryDate.getMonth() + 1);

            // 5. Buat Teks Testimoni Done
            const textDone = `TRANSACTION DONE ✅\n\n🆔 Order ID : ${orderId}\n📅 Tanggal : ${tanggal}\n\n📦 RINCIAN PAKET\n▪️ Nama : ${namaPaket}\n▪️ Harga : ${harga}\n▪️ Spek : ${spek}\n\nTerimakasih Sudah Beli Di AdHost 👍🏼`;

            const newData = {
                id: Date.now().toString(),
                orderId, tanggal, wa, namaPaket, harga, spek,
                purchaseDateMs: purchaseDate.getTime(),
                expiryDateMs: expiryDate.getTime(),
                textDone
            };

            let db = JSON.parse(localStorage.getItem("adhost_db")) || [];
            db.unshift(newData);
            localStorage.setItem("adhost_db", JSON.stringify(db));

            document.getElementById("invoiceInput").value = "";
            renderCards();
        }

        function renderCards() {
            const container = document.getElementById("cardsContainer");
            container.innerHTML = "";
            let db = JSON.parse(localStorage.getItem("adhost_db")) || [];
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const now = today.getTime();

            db.forEach(data => {
                const expDateObj = new Date(data.expiryDateMs);
                expDateObj.setHours(0, 0, 0, 0);
                const expiryMs = expDateObj.getTime();

                const isExpired = now >= expiryMs;
                const cardStatusClass = isExpired ? 'card-expired' : 'card-online';
                
                // Hitung Mundur Sisa Hari
                let sisaHariText = "Habis";
                if (!isExpired) {
                    const diffTime = expiryMs - now;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    sisaHariText = `${diffDays} hari lagi`;
                }
                
                let waLink = data.wa.replace(/\D/g, '');
                if (waLink.startsWith('0')) waLink = '62' + waLink.substring(1);

                container.innerHTML += `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col ${cardStatusClass}">
                        <div class="flex justify-between mb-2">
                            <span class="text-xs font-bold text-gray-400">${data.orderId}</span>
                            ${isExpired ? '<span class="text-[10px] bg-red-100 text-red-600 px-2 py-1 rounded font-bold">EXPIRED</span>' : '<span class="text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded font-bold">ONLINE</span>'}
                        </div>
                        
                        <h3 class="font-bold text-gray-800 text-lg">${data.namaPaket}</h3>
                        <p class="text-xs text-gray-500 mb-4">${data.spek}</p>

                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <button onclick="copyTesti('${data.id}')" id="btn-t-${data.id}" class="bg-gray-800 text-white text-xs py-2.5 rounded font-bold hover:bg-gray-900 transition">📋 Copy Testi</button>
                            <a href="https://wa.me/${waLink}" target="_blank" class="bg-green-500 text-white text-xs py-2.5 rounded font-bold hover:bg-green-600 transition text-center flex items-center justify-center">💬 WA Client</a>
                            
                            <button onclick="openModal('${data.id}')" id="btn-w-${data.id}" class="col-span-2 bg-blue-600 text-white text-xs py-2.5 rounded font-bold hover:bg-blue-700 transition">
                                🌐 Copy Text Web Login
                            </button>
                        </div>

                        <div class="mt-auto pt-3 border-t border-gray-100 flex justify-between items-center">
                            <span class="text-[11px] text-gray-500 font-medium">
                                Exp: <span class="text-gray-800 font-bold">${expDateObj.toLocaleDateString('id-ID')}</span> 
                                <span class="${isExpired ? 'text-red-500' : 'text-orange-500'} ml-1 font-bold">(${sisaHariText})</span>
                            </span>
                            <button onclick="deleteData('${data.id}')" class="text-gray-400 hover:text-red-500 text-lg" title="Hapus Data">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        // --- FUNGSI MODAL ---
        function openModal(id) {
            currentWebId = id; 
            const modal = document.getElementById('customModal');
            const input = document.getElementById('userPanelInput');
            input.value = "user" + Math.floor(Math.random() * 1000); 
            modal.classList.remove('hidden');
            setTimeout(() => input.focus(), 100); 
        }

        function closeModal() {
            document.getElementById('customModal').classList.add('hidden');
            currentWebId = null;
        }

        function confirmCopyWeb() {
            if (!currentWebId) return;
            const userPanel = document.getElementById('userPanelInput').value;
            if (!userPanel.trim()) {
                alert("Nama User Panel tidak boleh kosong!");
                return;
            }

            const db = JSON.parse(localStorage.getItem("adhost_db")) || [];
            const data = db.find(d => d.id === currentWebId);

            if (data) {
                const textWeb = `*🆔 Order ID :* ${data.orderId}\n*👤User Panel :* ${userPanel}\n*🔑 Pw Panel :* 1212\n*🌐 Panel Web:* https://panel.admudsmp.my.id`;
                
                navigator.clipboard.writeText(textWeb).then(() => {
                    const btnModal = document.getElementById('btn-modal-copy');
                    btnModal.innerText = "✅ Done!";
                    btnModal.classList.replace("bg-blue-600", "bg-green-600");
                    
                    const btnLuar = document.getElementById(`btn-w-${currentWebId}`);
                    const originalLuar = btnLuar.innerText;
                    btnLuar.innerText = "✅ Web Login Copied!";
                    btnLuar.classList.replace("bg-blue-600", "bg-green-600");

                    setTimeout(() => {
                        btnModal.innerText = "📋 Copy";
                        btnModal.classList.replace("bg-green-600", "bg-blue-600");
                        
                        btnLuar.innerText = originalLuar;
                        btnLuar.classList.replace("bg-green-600", "bg-blue-600");
                        closeModal(); 
                    }, 1000);
                });
            }
        }

        function copyTesti(id) {
            const db = JSON.parse(localStorage.getItem("adhost_db")) || [];
            const data = db.find(d => d.id === id);
            if (data) {
                navigator.clipboard.writeText(data.textDone).then(() => {
                    const btn = document.getElementById(`btn-t-${id}`);
                    const originalText = btn.innerText;
                    btn.innerText = "✅ Copied!";
                    btn.classList.replace("bg-gray-800", "bg-green-600");
                    setTimeout(() => { 
                        btn.innerText = originalText; 
                        btn.classList.replace("bg-green-600", "bg-gray-800");
                    }, 2000);
                });
            }
        }

        function deleteData(id) {
            if (confirm("Hapus data transaksi ini?")) {
                let db = JSON.parse(localStorage.getItem("adhost_db")) || [];
                db = db.filter(d => d.id !== id);
                localStorage.setItem("adhost_db", JSON.stringify(db));
                renderCards();
            }
        }
    </script>
</body>
</html>
