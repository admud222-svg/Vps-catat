<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPS Purchase Tracker - Catat Pembelian VPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #48bb78;
            --danger: #f56565;
            --warning: #ed8936;
            --dark: #2d3748;
            --gray: #718096;
            --light: #f7fafc;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--dark);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .subtitle {
            color: var(--gray);
            font-size: 1.1rem;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            animation: fadeIn 0.5s ease;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .stat-label {
            color: var(--gray);
            margin-top: 5px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: var(--secondary);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        .categories-container {
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            animation: slideUp 0.5s ease 0.2s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .category-item {
            background: var(--light);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeInScale 0.3s ease;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .category-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .category-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--dark);
        }

        .vps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .vps-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .vps-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }

        .vps-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .vps-specs {
            display: grid;
            gap: 8px;
            margin-bottom: 15px;
        }

        .spec-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gray);
            font-size: 0.95rem;
        }

        .spec-icon {
            width: 20px;
            height: 20px;
            background: var(--primary);
            color: white;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .vps-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .vps-location {
            display: inline-block;
            background: var(--light);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 15px;
        }

        .transaction-proof {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
        }

        .proof-label {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 8px;
        }

        .proof-image {
            width: 100%;
            max-width: 200px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .proof-image:hover {
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUpModal 0.3s ease;
        }

        @keyframes slideUpModal {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.5rem;
            color: var(--dark);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray);
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--danger);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .image-upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .image-upload-area:hover {
            border-color: var(--primary);
            background: var(--light);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .search-bar {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 25px;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }

        .search-bar:focus {
            outline: none;
            border-color: var(--primary);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .vps-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <div class="logo">🖥️</div>
                VPS Purchase Tracker
            </h1>
            <p class="subtitle">Kelola dan catat semua pembelian VPS Anda dengan mudah</p>
        </header>

        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-number" id="totalCategories">0</div>
                <div class="stat-label">Kategori</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalVPS">0</div>
                <div class="stat-label">Total VPS</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalValue">0</div>
                <div class="stat-label">Total Nilai (K)</div>
            </div>
        </div>

        <div class="categories-container">
            <div class="category-header">
                <h2>📁 Kategori VPS</h2>
                <button class="btn btn-primary" onclick="openCategoryModal()">
                    <span>➕</span> Tambah Kategori
                </button>
            </div>

            <input type="text" class="search-bar" id="searchBar" placeholder="🔍 Cari VPS berdasarkan spesifikasi atau lokasi...">

            <div id="categoriesList"></div>
        </div>
    </div>

    <!-- Modal Kategori -->
    <div class="modal" id="categoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Tambah Kategori Baru</h3>
                <button class="close-btn" onclick="closeModal('categoryModal')">&times;</button>
            </div>
            <form onsubmit="addCategory(event)">
                <div class="form-group">
                    <label class="form-label">Nama Kategori</label>
                    <input type="text" class="form-control" id="categoryName" required placeholder="Contoh: VPS Genoa, VPS Milan">
                </div>
                <button type="submit" class="btn btn-primary">Simpan Kategori</button>
            </form>
        </div>
    </div>

    <!-- Modal VPS -->
    <div class="modal" id="vpsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Tambah VPS Baru</h3>
                <button class="close-btn" onclick="closeModal('vpsModal')">&times;</button>
            </div>
            <form onsubmit="addVPS(event)">
                <input type="hidden" id="categoryId">
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">RAM (GB)</label>
                        <input type="number" class="form-control" id="ram" required placeholder="2">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Core</label>
                        <input type="number" class="form-control" id="core" required placeholder="1">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">SSD (GB)</label>
                        <input type="number" class="form-control" id="ssd" required placeholder="40">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Bandwidth (TB)</label>
                        <input type="number" step="0.1" class="form-control" id="bandwidth" required placeholder="0.5">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Harga (Ribu)</label>
                        <input type="number" class="form-control" id="price" required placeholder="35">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Lokasi</label>
                        <input type="text" class="form-control" id="location" required placeholder="Genoa/Milan">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Bukti Transaksi</label>
                    <div class="image-upload-area" onclick="document.getElementById('proofInput').click()">
                        <input type="file" id="proofInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                        <div id="uploadPreview">
                            <div style="font-size: 2rem;">📷</div>
                            <p>Klik untuk upload gambar atau masukkan URL</p>
                        </div>
                    </div>
                    <input type="url" class="form-control" id="proofUrl" placeholder="Atau masukkan URL gambar" style="margin-top: 10px;">
                </div>

                <button type="submit" class="btn btn-primary">Simpan VPS</button>
            </form>
        </div>
    </div>

    <!-- Modal Preview Gambar -->
    <div class="modal" id="imageModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3 class="modal-title">Preview Bukti Transaksi</h3>
                <button class="close-btn" onclick="closeModal('imageModal')">&times;</button>
            </div>
            <img id="previewImage" style="width: 100%; border-radius: 10px;">
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let categories = [];
        let currentImageData = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderCategories();
            updateStats();
            initializeSampleData();
        });

        // Initialize sample data if empty
        function initializeSampleData() {
            if (categories.length === 0) {
                const sampleVPS = [
                    { ram: 2, core: 1, ssd: 40, bandwidth: 0.5, price: 35, location: 'Genoa' },
                    { ram: 4, core: 2, ssd: 80, bandwidth: 1, price: 45, location: 'Genoa' },
                    { ram: 8, core: 4, ssd: 160, bandwidth: 2, price: 65, location: 'Genoa' },
                    { ram: 16, core: 4, ssd: 160, bandwidth: 2, price: 70, location: 'Milan' },
                    { ram: 16, core: 8, ssd: 320, bandwidth: 3, price: 80, location: 'Genoa' },
                    { ram: 32, core: 8, ssd: 240, bandwidth: 3, price: 90, location: 'Milan' },
                    { ram: 32, core: 16, ssd: 680, bandwidth: 5, price: 100, location: 'Genoa' },
                    { ram: 64, core: 8, ssd: 320, bandwidth: 4, price: 110, location: 'Milan' },
                    { ram: 128, core: 32, ssd: 600, bandwidth: 6, price: 140, location: 'Milan' },
                    { ram: 192, core: 48, ssd: 960, bandwidth: 8, price: 180, location: 'Milan' }
                ];

                const genoaCategory = {
                    id: Date.now(),
                    name: 'VPS Genoa',
                    vpsList: sampleVPS.filter(v => v.location === 'Genoa').map(v => ({
                        ...v,
                        id: Date.now() + Math.random(),
                        proof: `https://picsum.photos/seed/genoa${v.ram}/400/300.jpg`
                    }))
                };

                const milanCategory = {
                    id: Date.now() + 1,
                    name: 'VPS Milan',
                    vpsList: sampleVPS.filter(v => v.location === 'Milan').map(v => ({
                        ...v,
                        id: Date.now() + Math.random() + 1,
                        proof: `https://picsum.photos/seed/milan${v.ram}/400/300.jpg`
                    }))
                };

                categories = [genoaCategory, milanCategory];
                saveData();
                renderCategories();
                updateStats();
            }
        }

        // Search functionality
        document.getElementById('searchBar').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            renderCategories(searchTerm);
        });

        function renderCategories(searchTerm = '') {
            const container = document.getElementById('categoriesList');
            
            if (categories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📂</div>
                        <h3>Belum ada kategori</h3>
                        <p>Tambahkan kategori pertama Anda untuk memulai</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = categories.map(category => {
                let filteredVPS = category.vpsList;
                
                if (searchTerm) {
                    filteredVPS = category.vpsList.filter(vps => 
                        vps.location.toLowerCase().includes(searchTerm) ||
                        vps.ram.toString().includes(searchTerm) ||
                        vps.core.toString().includes(searchTerm) ||
                        vps.ssd.toString().includes(searchTerm) ||
                        vps.bandwidth.toString().includes(searchTerm) ||
                        vps.price.toString().includes(searchTerm)
                    );
                }

                return `
                    <div class="category-item">
                        <div class="category-title">
                            <span class="category-name">📁 ${category.name}</span>
                            <div>
                                <button class="btn btn-success btn-sm" onclick="openVPSModal(${category.id})">
                                    ➕ Tambah VPS
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="deleteCategory(${category.id})">
                                    🗑️
                                </button>
                            </div>
                        </div>
                        ${filteredVPS.length > 0 ? `
                            <div class="vps-grid">
                                ${filteredVPS.map(vps => `
                                    <div class="vps-card">
                                        <div class="vps-header">
                                            <div>
                                                <div class="vps-price">Rp ${vps.price}K/bulan</div>
                                                <span class="vps-location">📍 ${vps.location}</span>
                                            </div>
                                            <button class="btn btn-danger btn-sm" onclick="deleteVPS(${category.id}, ${vps.id})">
                                                🗑️
                                            </button>
                                        </div>
                                        <div class="vps-specs">
                                            <div class="spec-item">
                                                <span class="spec-icon">💾</span>
                                                <span>RAM: ${vps.ram}GB</span>
                                            </div>
                                            <div class="spec-item">
                                                <span class="spec-icon">⚡</span>
                                                <span>Core: ${vps.core}</span>
                                            </div>
                                            <div class="spec-item">
                                                <span class="spec-icon">💿</span>
                                                <span>SSD: ${vps.ssd}GB</span>
                                            </div>
                                            <div class="spec-item">
                                                <span class="spec-icon">🌐</span>
                                                <span>Bandwidth: ${vps.bandwidth}TB</span>
                                            </div>
                                        </div>
                                        ${vps.proof ? `
                                            <div class="transaction-proof">
                                                <div class="proof-label">Bukti Transaksi:</div>
                                                <img src="${vps.proof}" class="proof-image" onclick="openImageModal('${vps.proof}')" alt="Bukti Transaksi">
                                            </div>
                                        ` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        ` : searchTerm ? `
                            <p style="text-align: center; color: var(--gray); padding: 20px;">
                                Tidak ada VPS yang cocok dengan pencarian "${searchTerm}"
                            </p>
                        ` : `
                            <p style="text-align: center; color: var(--gray); padding: 20px;">
                                Belum ada VPS dalam kategori ini
                            </p>
                        `}
                    </div>
                `;
            }).join('');
        }

        function openCategoryModal() {
            document.getElementById('categoryModal').classList.add('active');
        }

        function openVPSModal(categoryId) {
            document.getElementById('categoryId').value = categoryId;
            document.getElementById('vpsModal').classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            if (modalId === 'vpsModal') {
                document.getElementById('vpsModal').querySelector('form').reset();
                document.getElementById('uploadPreview').innerHTML = `
                    <div style="font-size: 2rem;">📷</div>
                    <p>Klik untuk upload gambar atau masukkan URL</p>
                `;
                currentImageData = null;
            }
        }

        function addCategory(event) {
            event.preventDefault();
            const name = document.getElementById('categoryName').value;
            
            const newCategory = {
                id: Date.now(),
                name: name,
                vpsList: []
            };
            
            categories.push(newCategory);
            saveData();
            renderCategories();
            updateStats();
            closeModal('categoryModal');
            showToast(`Kategori "${name}" berhasil ditambahkan!`);
            document.getElementById('categoryName').value = '';
        }

        function addVPS(event) {
            event.preventDefault();
            const categoryId = parseInt(document.getElementById('categoryId').value);
            
            const newVPS = {
                id: Date.now(),
                ram: parseInt(document.getElementById('ram').value),
                core: parseInt(document.getElementById('core').value),
                ssd: parseInt(document.getElementById('ssd').value),
                bandwidth: parseFloat(document.getElementById('bandwidth').value),
                price: parseInt(document.getElementById('price').value),
                location: document.getElementById('location').value,
                proof: currentImageData || document.getElementById('proofUrl').value
            };
            
            const category = categories.find(c => c.id === categoryId);
            if (category) {
                category.vpsList.push(newVPS);
                saveData();
                renderCategories();
                updateStats();
                closeModal('vpsModal');
                showToast('VPS berhasil ditambahkan!');
            }
        }

        function deleteCategory(categoryId) {
            if (confirm('Apakah Anda yakin ingin menghapus kategori ini? Semua VPS di dalamnya akan terhapus.')) {
                categories = categories.filter(c => c.id !== categoryId);
                saveData();
                renderCategories();
                updateStats();
                showToast('Kategori berhasil dihapus!');
            }
        }

        function deleteVPS(categoryId, vpsId) {
            if (confirm('Apakah Anda yakin ingin menghapus VPS ini?')) {
                const category = categories.find(c => c.id === categoryId);
                if (category) {
                    category.vpsList = category.vpsList.filter(v => v.id !== vpsId);
                    saveData();
                    renderCategories();
                    updateStats();
                    showToast('VPS berhasil dihapus!');
                }
            }
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageData = e.target.result;
                    document.getElementById('uploadPreview').innerHTML = `
                        <img src="${e.target.result}" style="max-width: 100%; max-height: 150px; border-radius: 8px;">
                        <p> Gambar berhasil diupload</p>
                    `;
                };
                reader.readAsDataURL(file);
            }
        }

        function openImageModal(imageSrc) {
            document.getElementById('previewImage').src = imageSrc;
            document.getElementById('imageModal').classList.add('active');
        }

        function updateStats() {
            const totalCategories = categories.length;
            const totalVPS = categories.reduce((sum, cat) => sum + cat.vpsList.length, 0);
            const totalValue = categories.reduce((sum, cat) => 
                sum + cat.vpsList.reduce((vpsSum, vps) => vpsSum + vps.price, 0), 0
            );
            
            document.getElementById('totalCategories').textContent = totalCategories;
            document.getElementById('totalVPS').textContent = totalVPS;
            document.getElementById('totalValue').textContent = totalValue;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function saveData() {
            localStorage.setItem('vpsCategories', JSON.stringify(categories));
        }

        function loadData() {
            const saved = localStorage.getItem('vpsCategories');
            if (saved) {
                categories = JSON.parse(saved);
            }
        }

        // Close modals when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.classList.remove('active');
            }
        }
    </script>
</body>
</html>
